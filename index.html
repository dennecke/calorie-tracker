<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Kalorien Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <div id="root"></div>

    <script type="text/babel">
        // Hilfsfunktionen für das Datum
        const getTodayStr = () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            return new Date(now.getTime() - offset).toISOString().split('T')[0];
        };

        const getYesterdayStr = () => {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

        function App() {
            // --- BASIS STATE ---
            const initialConfig = JSON.parse(localStorage.getItem('isConfigured')) || false;
            const [isConfigured, setIsConfigured] = React.useState(initialConfig);
            
            // NAVIGATION ('tracker', 'settings', 'profile')
            const [currentView, setCurrentView] = React.useState(initialConfig ? 'tracker' : 'profile');

            // --- EINSTELLUNGEN STATE ---
            const [gender, setGender] = React.useState(() => localStorage.getItem('gender') || 'male');
            const [age, setAge] = React.useState(() => localStorage.getItem('age') || '');
            const [weight, setWeight] = React.useState(() => localStorage.getItem('weight') || '');
            const [height, setHeight] = React.useState(() => localStorage.getItem('height') || '');
            const [activity, setActivity] = React.useState(() => localStorage.getItem('activity') || '1.2'); 
            const [goal, setGoal] = React.useState(() => localStorage.getItem('goal') || 'lose');
            const [rate, setRate] = React.useState(() => localStorage.getItem('rate') || '0.5');
            const [calorieGoal, setCalorieGoal] = React.useState(() => JSON.parse(localStorage.getItem('calorieGoal')) || 0);

            // --- DATUM & HISTORIE STATE ---
            const [selectedDate, setSelectedDate] = React.useState(getTodayStr());
            const [history, setHistory] = React.useState(() => {
                const saved = localStorage.getItem('foodHistory');
                if (saved) return JSON.parse(saved);
                const oldFoods = localStorage.getItem('consumedFoods');
                if (oldFoods) {
                    try {
                        const parsed = JSON.parse(oldFoods);
                        if (Array.isArray(parsed) && parsed.length > 0) return { [getTodayStr()]: parsed };
                    } catch(e) {}
                }
                return {};
            });

            // --- TEMPORÄRE STATES ---
            const [searchTerm, setSearchTerm] = React.useState('');
            const [searchResults, setSearchResults] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(false);
            const [showCustomForm, setShowCustomForm] = React.useState(false);
            const [customName, setCustomName] = React.useState('');
            const [customKcal, setCustomKcal] = React.useState('');
            const [customAmount, setCustomAmount] = React.useState('');

            // --- AUTOMATISCHES SPEICHERN ---
            React.useEffect(() => {
                localStorage.setItem('isConfigured', JSON.stringify(isConfigured));
                localStorage.setItem('gender', gender);
                localStorage.setItem('age', age);
                localStorage.setItem('weight', weight);
                localStorage.setItem('height', height);
                localStorage.setItem('activity', activity);
                localStorage.setItem('goal', goal);
                localStorage.setItem('rate', rate);
                localStorage.setItem('calorieGoal', JSON.stringify(calorieGoal));
                localStorage.setItem('foodHistory', JSON.stringify(history));
            }, [isConfigured, gender, age, weight, height, activity, goal, rate, calorieGoal, history]);

            // Bedarf berechnen
            const calculateNeeds = () => {
                if(!age || !weight || !height) return alert("Bitte Alter, Gewicht und Größe ausfüllen!");
                let bmr = (10 * parseFloat(weight)) + (6.25 * parseFloat(height)) - (5 * parseInt(age));
                bmr = gender === 'male' ? bmr + 5 : bmr - 161;
                let tdee = bmr * parseFloat(activity);
                let adjustment = 0;
                if(goal === 'lose') adjustment = rate === '0.5' ? -500 : -1000;
                else if (goal === 'gain') adjustment = rate === '0.5' ? 500 : 1000;
                let finalGoal = Math.round(tdee + adjustment);
                if(gender === 'female' && finalGoal < 1200) finalGoal = 1200;
                if(gender === 'male' && finalGoal < 1500) finalGoal = 1500;
                
                setCalorieGoal(finalGoal);
                setIsConfigured(true);
                setCurrentView('tracker'); // Nach dem Speichern zurück zum Tracker
            };

            // API Suche und Hinzufügen (vereinfacht im Code, Logik identisch)
            const searchFood = async () => {
                if (!searchTerm) return;
                setIsLoading(true);
                try {
                    const response = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${searchTerm}&search_simple=1&action=process&json=1&page_size=5`);
                    const data = await response.json();
                    const formattedResults = data.products
                        .filter(p => p.product_name && p.nutriments && p.nutriments['energy-kcal_100g'])
                        .map(p => ({
                            name: p.product_name,
                            brand: p.brands || 'Unbekannt',
                            caloriesPer100: Math.round(p.nutriments['energy-kcal_100g'])
                        }));
                    setSearchResults(formattedResults);
                } catch (error) { console.error(error); }
                setIsLoading(false);
            };

            const addFoodToDate = (foodItem) => {
                const newHistory = { ...history };
                const dayFoods = newHistory[selectedDate] || [];
                newHistory[selectedDate] = [...dayFoods, foodItem];
                setHistory(newHistory);
            };

            const addApiFood = (food) => {
                const amountStr = window.prompt(`Wie viel Gramm von "${food.name}" hast du gegessen?`, "100");
                if (amountStr === null) return; 
                const amount = parseFloat(amountStr);
                if (isNaN(amount) || amount <= 0) return alert("Bitte eine gültige Zahl eingeben!");
                addFoodToDate({ name: food.name, amount: amount, calories: Math.round((food.caloriesPer100 / 100) * amount) });
                setSearchResults([]); setSearchTerm('');    
            };

            const addCustomFood = () => {
                if(!customName || !customKcal || !customAmount) return alert("Bitte alle Felder ausfüllen!");
                addFoodToDate({ name: customName, amount: parseFloat(customAmount), calories: Math.round((parseFloat(customKcal) / 100) * parseFloat(customAmount)) });
                setCustomName(''); setCustomKcal(''); setCustomAmount(''); setShowCustomForm(false);
            };

            const removeFoodFromDate = (indexToRemove) => {
                const newHistory = { ...history };
                newHistory[selectedDate] = (newHistory[selectedDate] || []).filter((_, index) => index !== indexToRemove);
                setHistory(newHistory);
            };

            // Text-Formatierungen
            const currentDayFoods = history[selectedDate] || [];
            const totalConsumed = currentDayFoods.reduce((sum, food) => sum + food.calories, 0);
            const remainingCalories = calorieGoal - totalConsumed;

            const displayDateLabel = () => {
                if (selectedDate === getTodayStr()) return "Heute";
                if (selectedDate === getYesterdayStr()) return "Gestern";
                return new Date(selectedDate).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
            };

            const displayHeadingText = () => {
                if (selectedDate === getTodayStr()) return "Heute gegessen";
                if (selectedDate === getYesterdayStr()) return "Gestern gegessen";
                return `Am ${displayDateLabel()} gegessen`;
            };

            // === UI: EINSTELLUNGEN ÜBERSICHT ===
            if (currentView === 'settings') {
                return (
                    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
                        <div class="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md flex items-center gap-4">
                            <button onClick={() => setCurrentView('tracker')} class="text-3xl font-bold hover:text-gray-200 transition">&larr;</button>
                            <h1 class="text-2xl font-bold">Einstellungen</h1>
                        </div>
                        <div class="p-6 space-y-4">
                            <button onClick={() => setCurrentView('profile')} class="w-full bg-gray-50 p-4 border border-gray-200 rounded-xl text-left font-semibold hover:bg-gray-100 transition flex justify-between items-center shadow-sm">
                                <span class="flex items-center gap-3"><span class="text-xl">👤</span> Profil & Ziele</span>
                                <span class="text-gray-400">&rarr;</span>
                            </button>
                            
                            {/* Platzhalter für später */}
                            <div class="w-full bg-gray-50 p-4 rounded-xl text-left text-gray-400 font-semibold border border-dashed border-gray-300 flex items-center gap-3">
                                <span class="text-xl">⚙️</span> Weitere Features folgen...
                            </div>
                        </div>
                    </div>
                );
            }

            // === UI: PROFIL & ZIELE SCREEN ===
            if (currentView === 'profile') {
                return (
                    <div class="max-w-md mx-auto bg-white min-h-screen p-6 shadow-lg">
                        {isConfigured && (
                            <button onClick={() => setCurrentView('settings')} class="mb-6 text-gray-500 hover:text-blue-600 font-bold flex items-center gap-2">
                                <span>&larr;</span> Zurück
                            </button>
                        )}
                        <h1 class="text-2xl font-bold mb-2 text-blue-600">Dein Profil</h1>
                        <p class="text-sm text-gray-500 mb-6">Wir berechnen deinen wissenschaftlich genauen Kalorienbedarf.</p>
                        
                        <div class="space-y-4">
                            <select value={gender} onChange={e => setGender(e.target.value)} class="w-full p-3 border rounded-lg">
                                <option value="male">Männlich</option>
                                <option value="female">Weiblich</option>
                            </select>
                            <div class="flex gap-2">
                                <input type="number" placeholder="Alter (Jahre)" value={age} onChange={e => setAge(e.target.value)} class="w-full p-3 border rounded-lg" />
                                <input type="number" placeholder="Gewicht (kg)" value={weight} onChange={e => setWeight(e.target.value)} class="w-full p-3 border rounded-lg" />
                            </div>
                            <input type="number" placeholder="Größe (cm)" value={height} onChange={e => setHeight(e.target.value)} class="w-full p-3 border rounded-lg" />
                            <select value={activity} onChange={e => setActivity(e.target.value)} class="w-full p-3 border rounded-lg">
                                <option value="1.2">Bürojob / kaum Bewegung</option>
                                <option value="1.375">Leicht aktiv (1-3x Sport/Woche)</option>
                                <option value="1.55">Moderat aktiv (3-5x Sport/Woche)</option>
                                <option value="1.725">Sehr aktiv (täglich Sport/körperl. Arbeit)</option>
                            </select>
                            <select value={goal} onChange={e => setGoal(e.target.value)} class="w-full p-3 border rounded-lg">
                                <option value="lose">Abnehmen</option>
                                <option value="maintain">Gewicht halten</option>
                                <option value="gain">Zunehmen</option>
                            </select>
                            {goal !== 'maintain' && (
                                <select value={rate} onChange={e => setRate(e.target.value)} class="w-full p-3 border rounded-lg">
                                    <option value="0.5">0,5 kg pro Woche</option>
                                    <option value="1.0">1,0 kg pro Woche (Intensiv)</option>
                                </select>
                            )}
                            <button onClick={calculateNeeds} class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-4">
                                Bedarf berechnen & Speichern
                            </button>
                        </div>
                    </div>
                );
            }

            // === UI: TRACKER SCREEN ===
            return (
                <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-10">
                    <div class="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md">
                        <div class="flex justify-between items-center mb-6">
                            <h1 class="text-2xl font-bold">Mein Tracker</h1>
                            
                            {/* Oben Rechts: Kalender & Einstellungen */}
                            <div class="flex gap-2 items-stretch">
                                {/* Datumsauswahl */}
                                <div class="relative bg-white/20 px-3 py-2 rounded-lg text-sm font-semibold flex items-center border border-white/30 hover:bg-white/30 transition cursor-pointer">
                                    <label htmlFor="datePicker" class="cursor-pointer flex items-center gap-2 w-full h-full">
                                        📅 {displayDateLabel()}
                                    </label>
                                    <input 
                                        id="datePicker"
                                        type="date" 
                                        max={getTodayStr()}
                                        value={selectedDate}
                                        onChange={(e) => setSelectedDate(e.target.value)}
                                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                    />
                                </div>
                                
                                {/* Zahnrad */}
                                <button 
                                    onClick={() => setCurrentView('settings')}
                                    class="bg-white/20 px-3 py-2 rounded-lg text-lg border border-white/30 hover:bg-white/30 transition flex items-center justify-center"
                                >
                                    ⚙️
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-center bg-white/20 p-4 rounded-xl">
                            <div class="text-center">
                                <p class="text-sm opacity-80">Ziel</p>
                                <p class="text-xl font-bold">{calorieGoal}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm opacity-80">Gegessen</p>
                                <p class="text-xl font-bold">{totalConsumed}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm opacity-80">Übrig</p>
                                <p class="text-xl font-bold">{remainingCalories}</p>
                            </div>
                        </div>
                    </div>

                    <div class="p-6">
                        {/* SUCHE */}
                        <div class="mb-4">
                            <h2 class="text-lg font-bold mb-2">Mahlzeit hinzufügen</h2>
                            <div class="flex gap-2">
                                <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Datenbank durchsuchen..." class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" onKeyDown={e => e.key === 'Enter' && searchFood()} />
                                <button onClick={searchFood} class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 transition">Suchen</button>
                            </div>
                        </div>

                        {/* SUCHGEBNISSE */}
                        {isLoading && <p class="text-center text-gray-500 my-4">Suche läuft...</p>}
                        {searchResults.length > 0 && (
                            <div class="mb-6 border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                                {searchResults.map((food, index) => (
                                    <div key={index} class="flex justify-between items-center p-3 bg-gray-50 border-b last:border-b-0">
                                        <div>
                                            <p class="font-bold">{food.name}</p>
                                            <p class="text-sm text-gray-500">{food.brand} • {food.caloriesPer100} kcal / 100g</p>
                                        </div>
                                        <button onClick={() => addApiFood(food)} class="bg-green-500 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-green-600">+</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* MANUELLE EINGABE */}
                        <div class="mb-8">
                            {!showCustomForm ? (
                                <button onClick={() => setShowCustomForm(true)} class="text-blue-600 text-sm font-semibold hover:underline">
                                    + Produkt nicht gefunden? Manuell eintragen
                                </button>
                            ) : (
                                <div class="bg-gray-50 p-4 rounded-lg border shadow-inner">
                                    <h3 class="font-bold mb-3 text-gray-700">Eigenes Produkt</h3>
                                    <div class="space-y-2 mb-3">
                                        <input type="text" placeholder="Name des Essens" value={customName} onChange={e => setCustomName(e.target.value)} class="w-full p-2 border rounded" />
                                        <div class="flex gap-2">
                                            <input type="number" placeholder="Kcal pro 100g" value={customKcal} onChange={e => setCustomKcal(e.target.value)} class="w-full p-2 border rounded" />
                                            <input type="number" placeholder="Menge in g" value={customAmount} onChange={e => setCustomAmount(e.target.value)} class="w-full p-2 border rounded" />
                                        </div>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onClick={addCustomFood} class="flex-1 bg-green-500 text-white font-bold py-2 rounded hover:bg-green-600">Speichern</button>
                                        <button onClick={() => setShowCustomForm(false)} class="flex-1 bg-gray-300 text-gray-700 font-bold py-2 rounded hover:bg-gray-400">Abbrechen</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* LISTE GEGESSENER DINGE */}
                        <div>
                            <div class="flex justify-between items-center border-b pb-2 mb-3">
                                <h2 class="text-lg font-bold">{displayHeadingText()}</h2>
                            </div>
                            
                            {currentDayFoods.length === 0 ? (
                                <p class="text-gray-500 text-center py-4">Noch nichts getrackt.</p>
                            ) : (
                                <ul>
                                    {currentDayFoods.map((food, index) => (
                                        <li key={index} class="flex justify-between items-center py-3 border-b border-gray-100">
                                            <div>
                                                <p class="font-semibold">{food.name}</p>
                                                <p class="text-xs text-gray-500">{food.amount}g</p>
                                            </div>
                                            <div class="flex items-center gap-4">
                                                <span class="font-bold text-red-500">{food.calories} kcal</span>
                                                <button onClick={() => removeFoodFromDate(index)} class="text-gray-400 hover:text-red-500 text-xl font-bold">&times;</button>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
