<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Kalorien Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // States (Zustände) unserer App
            const [searchTerm, setSearchTerm] = React.useState('');
            const [searchResults, setSearchResults] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(false);
            const [consumedFoods, setConsumedFoods] = React.useState([]);
            
            // Dein tägliches Ziel (kann später anpassbar gemacht werden)
            const calorieGoal = 2000;

            // Berechne die bisher gegessenen Kalorien
            const totalConsumed = consumedFoods.reduce((sum, food) => sum + food.calories, 0);
            const remainingCalories = calorieGoal - totalConsumed;

            // Funktion zum Suchen von Lebensmitteln über Open Food Facts
            const searchFood = async () => {
                if (!searchTerm) return;
                setIsLoading(true);
                try {
                    const response = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${searchTerm}&search_simple=1&action=process&json=1&page_size=5`);
                    const data = await response.json();
                    
                    // Wir filtern die Ergebnisse, um nur die mit Namen und Kalorien anzuzeigen
                    const formattedResults = data.products
                        .filter(p => p.product_name && p.nutriments && p.nutriments['energy-kcal_100g'])
                        .map(p => ({
                            id: p.id,
                            name: p.product_name,
                            brand: p.brands || 'Unbekannt',
                            calories: p.nutriments['energy-kcal_100g']
                        }));
                    
                    setSearchResults(formattedResults);
                } catch (error) {
                    console.error("Fehler bei der Suche:", error);
                    alert("Suche fehlgeschlagen.");
                }
                setIsLoading(false);
            };

            // Funktion um ein Lebensmittel hinzuzufügen
            const addFood = (food) => {
                setConsumedFoods([...consumedFoods, food]);
                setSearchResults([]); // Suchergebnisse leeren
                setSearchTerm('');    // Suchfeld leeren
            };

            return (
                <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
                    {/* Header Sektion */}
                    <div class="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md">
                        <h1 class="text-2xl font-bold text-center mb-4">Mein Tracker</h1>
                        
                        <div class="flex justify-between items-center bg-white/20 p-4 rounded-xl">
                            <div class="text-center">
                                <p class="text-sm opacity-80">Ziel</p>
                                <p class="text-xl font-bold">{calorieGoal}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm opacity-80">Gegessen</p>
                                <p class="text-xl font-bold">{totalConsumed}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm opacity-80">Übrig</p>
                                <p class="text-xl font-bold">{remainingCalories}</p>
                            </div>
                        </div>
                    </div>

                    <div class="p-6">
                        {/* Suchbereich */}
                        <div class="mb-6">
                            <h2 class="text-lg font-bold mb-2">Mahlzeit tracken</h2>
                            <div class="flex gap-2">
                                <input 
                                    type="text" 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    placeholder="z.B. Coca Cola..."
                                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                                    onKeyDown={(e) => e.key === 'Enter' && searchFood()}
                                />
                                <button 
                                    onClick={searchFood}
                                    class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 transition"
                                >
                                    Suchen
                                </button>
                            </div>
                        </div>

                        {/* Lade-Indikator */}
                        {isLoading && <p class="text-center text-gray-500 my-4">Suche läuft...</p>}

                        {/* Suchergebnisse */}
                        {searchResults.length > 0 && (
                            <div class="mb-8 border border-gray-200 rounded-lg overflow-hidden">
                                {searchResults.map((food, index) => (
                                    <div key={index} class="flex justify-between items-center p-3 bg-gray-50 border-b last:border-b-0">
                                        <div>
                                            <p class="font-bold">{food.name}</p>
                                            <p class="text-sm text-gray-500">{food.brand} • {food.calories} kcal / 100g</p>
                                        </div>
                                        <button 
                                            onClick={() => addFood(food)}
                                            class="bg-green-500 text-white px-3 py-1 rounded-full text-sm hover:bg-green-600"
                                        >
                                            +
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Liste der gegessenen Dinge */}
                        <div>
                            <h2 class="text-lg font-bold mb-3 border-b pb-2">Heute gegessen</h2>
                            {consumedFoods.length === 0 ? (
                                <p class="text-gray-500 text-center py-4">Noch nichts getrackt. Fang an!</p>
                            ) : (
                                <ul>
                                    {consumedFoods.map((food, index) => (
                                        <li key={index} class="flex justify-between py-3 border-b border-gray-100">
                                            <span>{food.name} (100g)</span>
                                            <span class="font-bold">{food.calories} kcal</span>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
